<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LeetLog AI - Dashboard</title>
  <style>
    :root {
      --primary: #f7a01a;
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #e0e0e0;
      --text-small: #999;
      --border: #2a2a3e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh;
      padding: 24px;
    }
    .header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 16px;
    }
    .header h1 { font-size: 22px; color: var(--primary); }
    .header p { font-size: 12px; color: var(--text-small); }

    /* Banners */
    .banner {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 16px;
    }
    #loadingBanner { background: #1a1a2e; color: var(--text-small); border: 1px solid var(--border); }
    #errorBanner   { background: #2a1a0e; color: #f7a01a;           border: 1px solid #f7a01a44; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card-bg); border-radius: 10px; padding: 18px;
      text-align: center; border: 1px solid var(--border);
    }
    .stat-card .value { font-size: 32px; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 11px; color: var(--text-small); margin-top: 4px; text-transform: uppercase; }
    .section {
      background: var(--card-bg); border-radius: 10px; padding: 18px;
      margin-bottom: 16px; border: 1px solid var(--border);
    }
    .section h2 { font-size: 14px; margin-bottom: 14px; font-weight: 600; }
    .platform-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .platform-name { font-size: 12px; width: 80px; }
    .bar-track { flex: 1; background: #2a2a3e; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-count { font-size: 12px; color: var(--text-small); width: 30px; text-align: right; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .week-day { text-align: center; }
    .week-label { font-size: 10px; color: var(--text-small); margin-bottom: 4px; }
    .week-box {
      height: 30px; border-radius: 4px; background: #2a2a3e;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .week-box.active { background: var(--primary); color: #000; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-title { flex: 1; font-weight: 500; }
    .history-platforms { font-size: 11px; color: var(--text-small); margin: 2px 0; }
    .history-date { font-size: 11px; color: var(--text-small); text-align: right; }
    .empty-state { text-align: center; color: var(--text-small); padding: 24px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>LeetLog AI Dashboard</h1>
      <p>Your publishing stats and activity</p>
    </div>
  </div>

  <div id="loadingBanner" class="banner">⏳ Loading stats from backend...</div>
  <div id="errorBanner" class="banner"></div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="value" id="totalPosts">—</div>
      <div class="label">Problems Published</div>
    </div>
    <div class="stat-card">
      <div class="value" id="streakCount">— 🔥</div>
      <div class="label">Day Streak</div>
    </div>
    <div class="stat-card">
      <div class="value" id="thisWeek">—</div>
      <div class="label">This Week</div>
    </div>
  </div>

  <div class="section">
    <h2>Last 7 Days Activity</h2>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="section">
    <h2>Platform Breakdown</h2>
    <div id="platformBars"></div>
  </div>

  <div class="section">
    <h2>Recent Activity</h2>
    <div id="historyList"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
