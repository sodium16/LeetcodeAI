<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetLog AI - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f7a01a;
      --bg-dark: #0f111a;
      --bg-glass: rgba(25, 27, 40, 0.6);
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #a0a5b5;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 32px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background ambient blobs */
    body::before, body::after {
        content: '';
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: -1;
        opacity: 0.4;
        animation: float 10s infinite alternate;
        will-change: transform, opacity;
    }
    body::before {
        background: rgba(247, 160, 26, 0.2);
        top: -100px;
        left: -100px;
    }
    body::after {
        background: rgba(138, 43, 226, 0.15);
        bottom: -100px;
        right: -100px;
        animation-delay: -5s;
    }

    @keyframes float {
        0% { transform: translateY(0) scale(0.9) translateZ(0); opacity: 0.3; }
        100% { transform: translateY(30px) scale(1.1) translateZ(0); opacity: 0.6; }
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border-glass);
    }
    .header-text h1 { font-family: 'Outfit', sans-serif; font-size: 28px; color: #fff; font-weight: 700; letter-spacing: -0.5px; }
    .header-text p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    /* Banners */
    .banner {
      display: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
      font-weight: 500;
    }
    #loadingBanner { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--border-glass); }
    #errorBanner   { background: rgba(247, 160, 26, 0.1); color: var(--primary); border: 1px solid rgba(247, 160, 26, 0.2); }

    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-glass); border-radius: 16px; padding: 24px;
      text-align: left; border: 1px solid var(--border-glass);
      backdrop-filter: blur(12px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
      will-change: transform;
    }
    .stat-card:hover {
        transform: translateY(-4px) translateZ(0);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.15);
    }
    .stat-card .value { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700; color: var(--primary); text-shadow: 0 0 20px rgba(247, 160, 26, 0.3); }
    .stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    
    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .section {
      background: var(--bg-glass); border-radius: 16px; padding: 24px;
      border: 1px solid var(--border-glass);
      backdrop-filter: blur(12px);
    }
    .section h2 { font-family: 'Outfit', sans-serif; font-size: 16px; margin-bottom: 20px; font-weight: 600; color: #fff; letter-spacing: 0.5px;}
    
    .platform-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .platform-name { font-size: 13px; width: 80px; font-weight: 500; }
    .bar-track { flex: 1; background: rgba(0, 0, 0, 0.3); border-radius: 6px; height: 12px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), #ffb340); box-shadow: 0 0 10px rgba(247, 160, 26, 0.3); transition: width 1s ease-out; }
    .bar-count { font-size: 13px; color: var(--text-muted); width: 30px; text-align: right; font-weight: 600;}
    
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .week-day { text-align: center; }
    .week-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .week-box {
      height: 40px; border-radius: 8px; background: rgba(0, 0, 0, 0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #555;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }
    .week-box.active { 
        background: rgba(247, 160, 26, 0.15); 
        color: var(--primary); 
        border-color: rgba(247, 160, 26, 0.3);
        box-shadow: 0 0 15px rgba(247, 160, 26, 0.15);
    }
    .week-box:hover {
        transform: scale(1.05);
    }
    
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid var(--border-glass); font-size: 14px;
      transition: background 0.2s;
    }
    .history-item:hover {
        background: rgba(255, 255, 255, 0.02);
        padding-left: 8px;
        padding-right: 8px;
        border-radius: 8px;
        margin: 0 -8px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-title { flex: 1; font-weight: 600; color: #fff; }
    .history-platforms { font-size: 12px; color: var(--primary); margin: 4px 0; font-weight: 500; }
    .history-date { font-size: 12px; color: var(--text-muted); text-align: right; }
    .empty-state { text-align: center; color: var(--text-muted); padding: 32px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>Dashboard</h1>
      <p>Your LeetCode publishing analytics</p>
    </div>
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
  </div>

  <div id="loadingBanner" class="banner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; vertical-align: text-bottom; margin-right: 6px;"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
      Loading stats from backend...
  </div>
  <div id="errorBanner" class="banner"></div>
  <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="value" id="totalPosts">—</div>
      <div class="label">Problems Published</div>
    </div>
    <div class="stat-card">
      <div class="value" id="streakCount">— 🔥</div>
      <div class="label">Day Streak</div>
    </div>
    <div class="stat-card">
      <div class="value" id="thisWeek">—</div>
      <div class="label">This Week</div>
    </div>
  </div>

  <div class="dashboard-grid">
      <div class="section">
        <h2>Last 7 Days Activity</h2>
        <div class="week-grid" id="weekGrid"></div>
      </div>
    
      <div class="section">
        <h2>Platform Breakdown</h2>
        <div id="platformBars"></div>
      </div>
  </div>

  <div class="section">
    <h2>Recent Activity</h2>
    <div id="historyList"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
